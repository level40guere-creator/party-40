<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#07070f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Party Fotos">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Party Fotos</title>
<style>
:root{
  --accent:#b400ff;--accent2:#00fff7;--glow:rgba(180,0,255,.45);
  --bg:#000;--bg2:#111;--bg3:#1a1a1a;
  --text:#fff;--text2:#999;--border:#262626;
}
[data-theme="cyber"]    {--accent:#00fff7;--accent2:#ff006e;--glow:rgba(0,255,247,.4);}
[data-theme="rave"]     {--accent:#ff003c;--accent2:#ff6b00;--glow:rgba(255,0,60,.4);}
[data-theme="galactic"] {--accent:#ffe600;--accent2:#00c3ff;--glow:rgba(255,230,0,.38);}
[data-theme="tropical"] {--accent:#00ff88;--accent2:#ffdd00;--glow:rgba(0,255,136,.38);}
[data-theme="minimal"]  {--accent:#ffffff;--accent2:#888;--glow:rgba(255,255,255,.15);}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:hidden;background:#000;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;font-size:17px;line-height:1.4;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.6;}

/* LOADING */
#loadingScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:10;gap:1rem;background:#000;}
.load-logo{font-size:3rem;font-weight:800;letter-spacing:-2px;font-family:'Helvetica Neue',sans-serif;}
.load-logo span{color:var(--accent);}
.load-dots{display:flex;gap:.5rem;}
.load-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite;}
.load-dot:nth-child(2){animation-delay:.2s;}
.load-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

/* APP */
#appScreen{display:none;min-height:100vh;position:relative;z-index:1;padding-bottom:65px;max-width:480px;margin:0 auto;}

/* HEADER */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-logo{font-size:28px;font-weight:700;color:var(--accent);text-shadow:0 0 20px var(--glow);letter-spacing:-.5px;font-family:'Helvetica Neue',sans-serif;}
.header-icons{display:flex;gap:20px;align-items:center;}
.hico{background:none;border:none;color:#fff;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;}
.hico svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* FEED */
.feed{display:flex;flex-direction:column;}
.post{border-bottom:1px solid var(--border);}

/* Post header */
.post-header{display:flex;align-items:center;padding:10px 14px;gap:10px;}
.post-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(45deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;color:#fff;border:2px solid var(--accent);}
.post-user{flex:1;}
.post-username{font-size:15px;font-weight:700;color:#fff;}
.post-time{font-size:13px;color:var(--text2);margin-top:1px;}
.post-more{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1;}

/* Media */
.post-media{width:100%;background:#111;position:relative;}
.post-media img{width:100%;display:block;max-height:580px;object-fit:contain;background:#000;}
.post-media video{width:100%;display:block;max-height:500px;object-fit:contain;background:#000;}

/* Actions */
.post-actions{display:flex;align-items:center;padding:8px 12px 4px;gap:6px;}
.act-btn{background:none;border:none;cursor:pointer;padding:6px 8px;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.act-btn:active{transform:scale(1.25);}
.act-btn svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.act-btn.liked svg{fill:#ff3040;stroke:#ff3040;}
.act-spacer{flex:1;}

/* Post info */
.post-likes{font-size:15px;font-weight:700;padding:2px 16px 4px;color:#fff;}
.post-caption{font-size:15px;padding:0 16px 6px;line-height:1.5;color:#fff;}
.post-caption strong{font-weight:700;margin-right:5px;}

/* Comments preview */
.post-comments-preview{padding:0 16px 4px;}
.cmts-count{font-size:15px;color:var(--text2);cursor:pointer;padding:2px 0;}
.cmts-count:active{opacity:.7;}
.comment-preview-line{font-size:15px;padding:2px 0;line-height:1.5;color:#fff;}
.comment-preview-line strong{font-weight:700;margin-right:5px;}
.post-time-small{font-size:12px;color:var(--text2);padding:4px 16px 8px;}

/* Comment input bar */
.comment-bar{display:flex;align-items:center;padding:8px 14px 10px;gap:10px;border-top:1px solid #111;}
.cbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(45deg,var(--accent),var(--accent2));flex-shrink:0;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;}
.cbar-input{flex:1;background:none;border:none;color:#fff;font-size:15px;outline:none;font-family:inherit;}
.cbar-input::placeholder{color:#555;}
.cbar-send{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;padding:0;opacity:.4;transition:opacity .2s;white-space:nowrap;}
.cbar-send.on{opacity:1;}

/* COMMENTS MODAL */
#cmtModal{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center;}
#cmtModal.open{display:flex;}
.cmt-sheet{background:#1a1a1a;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;border-top:1px solid #333;}
.cmt-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #333;flex-shrink:0;}
.cmt-sheet-title{font-size:17px;font-weight:700;}
.cmt-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
.cmt-list{flex:1;overflow-y:auto;padding:8px 0;}
.cmt-item{display:flex;align-items:flex-start;padding:10px 16px;gap:10px;}
.cmt-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(45deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;color:#fff;}
.cmt-body{flex:1;}
.cmt-name{font-size:15px;font-weight:700;display:inline;margin-right:6px;}
.cmt-text{font-size:15px;display:inline;color:#fff;line-height:1.5;}
.cmt-time{font-size:12px;color:var(--text2);margin-top:3px;}
.cmt-empty{text-align:center;padding:3rem 1rem;color:#555;font-size:15px;}
.cmt-input-bar{display:flex;align-items:center;padding:10px 14px 20px;gap:10px;border-top:1px solid #333;flex-shrink:0;}
.cmt-inp-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(45deg,var(--accent),var(--accent2));flex-shrink:0;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;}
.cmt-inp{flex:1;background:#262626;border:none;border-radius:22px;padding:10px 16px;color:#fff;font-size:15px;outline:none;font-family:inherit;}
.cmt-inp::placeholder{color:#555;}
.cmt-inp-send{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;padding:0 4px;opacity:.4;transition:opacity .2s;white-space:nowrap;}
.cmt-inp-send.on{opacity:1;}

/* UPLOAD MODAL */
#uploadModal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.8);align-items:flex-end;justify-content:center;}
#uploadModal.open{display:flex;}
.up-sheet{background:#1a1a1a;border-radius:16px 16px 0 0;padding:16px 16px 24px;width:100%;max-width:480px;border-top:1px solid #333;}
.up-handle{width:36px;height:4px;background:#444;border-radius:2px;margin:0 auto 14px;}
.up-title{font-size:18px;font-weight:700;margin-bottom:14px;}
.upzone{border:2px dashed #333;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .3s;position:relative;background:rgba(255,255,255,.02);margin-bottom:12px;}
.upzone:hover,.upzone.dov{border-color:var(--accent);}
.upzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.up-icon{font-size:2.2rem;margin-bottom:6px;}
.up-txt{font-size:16px;font-weight:600;margin-bottom:3px;}
.up-sub{font-size:13px;color:#777;}
.prevs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pthumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid #333;}
.pthumb img,.pthumb video{width:100%;height:100%;object-fit:cover;}
.pthumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.8);border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ni{width:100%;background:#262626;border:none;border-radius:12px;padding:12px 14px;color:#fff;font-size:16px;outline:none;margin-bottom:10px;font-family:inherit;}
.ni::placeholder{color:#555;}
.pbar{height:3px;background:#333;border-radius:2px;margin-bottom:8px;overflow:hidden;display:none;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .3s;}
.pst{font-size:13px;color:var(--accent);text-align:center;margin-bottom:6px;display:none;letter-spacing:1px;}
.ubtn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 0 16px var(--glow);}
.ubtn:disabled{opacity:.4;cursor:not-allowed;}

/* EMPTY */
.empty-feed{text-align:center;padding:5rem 1.5rem;color:#555;}
.empty-feed .ei{font-size:3.5rem;margin-bottom:1rem;}
.empty-feed p{font-size:16px;}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(0,0,0,.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  z-index:200;
}
.nav-ico{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;}
.nav-ico svg{width:30px;height:30px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-ico.add{background:var(--accent);border-radius:12px;padding:10px;box-shadow:0 0 16px var(--glow);}
.nav-ico.add svg{width:26px;height:26px;stroke:#fff;}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.98);z-index:700;align-items:center;justify-content:center;}
#lb.on{display:flex;}
#lb img,#lb video{max-width:100vw;max-height:92vh;object-fit:contain;}
.lbx{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;}

/* SLIDESHOW */
#ss{display:none;position:fixed;inset:0;background:#000;z-index:750;flex-direction:column;align-items:center;justify-content:center;}
#ss.on{display:flex;}
#ss img{max-width:100vw;max-height:86vh;object-fit:contain;}
.sinfo{position:absolute;bottom:2.5rem;left:0;right:0;text-align:center;}
.swho{font-size:14px;letter-spacing:4px;color:var(--accent);font-weight:700;}
.scnt{font-size:13px;color:#555;margin-top:3px;}
.sx{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;}
.sprog{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;border-radius:12px;padding:10px 20px;font-size:15px;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;}
#toast.on{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- COMMENTS MODAL -->
<div id="cmtModal" onclick="cmtModalBg(event)">
  <div class="cmt-sheet">
    <div class="cmt-sheet-header">
      <div class="cmt-sheet-title">Comentarios</div>
      <button class="cmt-close" onclick="closeCmts()">✕</button>
    </div>
    <div class="cmt-list" id="cmtList"></div>
    <div class="cmt-input-bar">
      <div class="cmt-inp-avatar" id="cmtAvatar">?</div>
      <input class="cmt-inp" id="cmtInp" placeholder="Agrega un comentario..." maxlength="150" oninput="toggleCmtSend(this.value)"/>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLB()">
  <button class="lbx" onclick="closeLB()">✕</button>
  <img id="lbi" src="" style="display:none"/>

<!-- SLIDESHOW -->

</div>

<script>
var CN='dkkqyl4km', UP='party_upload';
var FC={apiKey:"AIzaSyAKzHGUhQh_dUVbkRVKeCpsIBNAlvT6zU8",authDomain:"masuno-b1ce3.firebaseapp.com",projectId:"masuno-b1ce3",storageBucket:"masuno-b1ce3.firebasestorage.app",messagingSenderId:"701219611332",appId:"1:701219611332:web:732c60dc1fcfcbaecadf91"};
firebase.initializeApp(FC);
var db=firebase.firestore();
var pid='',sf=[],media=[],ssTimer=null,ssIdx=0,unsub=null;
var myName=localStorage.getItem('pUN')||'';
var activeCmtId='';

/* CANVAS */
var cv=document.getElementById('bgCanvas'),cx=cv.getContext('2d');
var beams=[],ptcls=[],crowd=[];
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
window.addEventListener('resize',function(){resize();initCrowd();});resize();
function hexRgb(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var n=parseInt(h,16);return[(n>>16)&255,(n>>8)&255,n&255];}
function cssV(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function initBeams(){beams=[];for(var i=0;i<8;i++)beams.push({x:cv.width*(i/7+.05),ba:-Math.PI/2+(Math.random()-.5)*.5,sw:.3+Math.random()*.25,sp:.0015+Math.random()*.002,of:Math.random()*Math.PI*2,w:30+Math.random()*60,cv:['--b1','--b2','--b3','--b4'][i%4]});}
function initPtcls(){ptcls=[];for(var i=0;i<70;i++)ptcls.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:.8+Math.random()*2,vx:(Math.random()-.5)*.3,vy:-.1-Math.random()*.4,a:Math.random(),cv:['--b1','--b2','--b3','--b4'][Math.floor(Math.random()*4)]});}
function initCrowd(){crowd=[];var n=Math.max(5,Math.floor(cv.width/80));for(var i=0;i<n;i++)crowd.push({x:cv.width*(i/(n-1))+(-15+Math.random()*30),ph:Math.random()*Math.PI*2,sp:.025+Math.random()*.02,sc:.6+Math.random()*.5});}
function drawP(x,y,sc,ph){cx.save();cx.translate(x,y);cx.scale(sc,sc);var sw=Math.sin(ph)*7,ar=Math.abs(Math.sin(ph));cx.beginPath();cx.arc(sw*.3,-62,9,0,Math.PI*2);cx.moveTo(sw*.3,-53);cx.lineTo(sw*.2,-22);cx.moveTo(sw*.2,-42);cx.lineTo(sw*.2-22,-42-ar*28);cx.moveTo(sw*.2,-42);cx.lineTo(sw*.2+22,-42-ar*22);cx.moveTo(sw*.2,-22);cx.lineTo(sw*.1-9,2);cx.moveTo(sw*.2,-22);cx.lineTo(sw*.1+9,2);cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=2.5;cx.lineCap='round';cx.stroke();cx.restore();}
function animate(){
  requestAnimationFrame(animate);cx.clearRect(0,0,cv.width,cv.height);
  var t=Date.now()*.001;
  beams.forEach(function(b){var angle=b.ba+Math.sin(t*b.sp*60+b.of)*b.sw;var rgb=[180,0,255];try{rgb=hexRgb(cssV(b.cv)||'#b400ff');}catch(e){}var g=cx.createLinearGradient(b.x,cv.height,b.x+Math.cos(angle)*cv.height*3,cv.height+Math.sin(angle)*cv.height*3);g.addColorStop(0,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',.08)');g.addColorStop(1,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0)');cx.save();cx.translate(b.x,cv.height);cx.rotate(angle+Math.PI/2);cx.fillStyle=g;cx.fillRect(-b.w/2,-cv.height*3,b.w,cv.height*3);cx.restore();});
  var ar=[180,0,255];try{ar=hexRgb(cssV('--accent')||'#b400ff');}catch(e){}
  var gg=cx.createLinearGradient(0,cv.height*.8,0,cv.height);gg.addColorStop(0,'rgba('+ar[0]+','+ar[1]+','+ar[2]+',0)');gg.addColorStop(1,'rgba('+ar[0]+','+ar[1]+','+ar[2]+',.07)');cx.fillStyle=gg;cx.fillRect(0,cv.height*.8,cv.width,cv.height*.2);
  crowd.forEach(function(p){p.ph+=p.sp;drawP(p.x,cv.height,p.sc,p.ph);});
  ptcls.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.a+=(Math.random()-.5)*.05;p.a=Math.max(.04,Math.min(.9,p.a));if(p.y<-5){p.y=cv.height+5;p.x=Math.random()*cv.width;}var rgb=[180,0,255];try{rgb=hexRgb(cssV(p.cv)||'#b400ff');}catch(e){}cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+p.a+')';cx.fill();});
}

/* INIT */
window.onload=function(){
  initBeams();initPtcls();initCrowd();animate();
  if(myName){document.getElementById('un').value=myName;var ini=myName[0].toUpperCase();document.getElementById('cmtAvatar').textContent=ini;}
  function showApp(){
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    if(pid)loadFeed();
  }
  // Timeout fallback — show app after 4s no matter what
  var appShown=false;
  var fallback=setTimeout(function(){if(!appShown){appShown=true;showApp();}},4000);

  db.collection('config').doc('party').get().then(function(doc){
    if(doc.exists){
      var d=doc.data();pid=d.partyId||'';
      var theme=d.theme||'tomorrow';
      document.documentElement.dataset.theme=theme==='tomorrow'?'':theme;
      if(d.color){
        document.documentElement.style.setProperty('--accent',d.color);
        var rgb=[180,0,255];try{rgb=hexRgb(d.color);}catch(e){}
        document.documentElement.style.setProperty('--glow','rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',.45)');
      }
      document.getElementById('headerLogo').textContent=(d.name||'PARTY FOTOS').toUpperCase();
      document.title=d.name||'Party Fotos';
    }
    if(!appShown){appShown=true;clearTimeout(fallback);setTimeout(showApp,600);}
  }).catch(function(){
    if(!appShown){appShown=true;clearTimeout(fallback);setTimeout(showApp,600);}
  });
};

/* UPLOAD */
function openUpload(){document.getElementById('uploadModal').classList.add('open');}
function closeUpload(){document.getElementById('uploadModal').classList.remove('open');}
function modalBg(e){if(e.target===document.getElementById('uploadModal'))closeUpload();}

function hf(files){
  sf=Array.from(files);
  var prev=document.getElementById('prevs');prev.innerHTML='';
  sf.forEach(function(f,i){var d=document.createElement('div');d.className='pthumb';var u=URL.createObjectURL(f);d.innerHTML=f.type.startsWith('video/')?'<video src="'+u+'" muted></video><button class="rm" onclick="rmf('+i+')">✕</button>':'<img src="'+u+'"><button class="rm" onclick="rmf('+i+')">✕</button>';prev.appendChild(d);});
  document.getElementById('ubtn').disabled=!sf.length;
}
function rmf(i){sf.splice(i,1);var prev=document.getElementById('prevs');prev.innerHTML='';sf.forEach(function(f,j){var d=document.createElement('div');d.className='pthumb';var u=URL.createObjectURL(f);d.innerHTML=f.type.startsWith('video/')?'<video src="'+u+'" muted></video><button class="rm" onclick="rmf('+j+')">✕</button>':'<img src="'+u+'"><button class="rm" onclick="rmf('+j+')">✕</button>';prev.appendChild(d);});document.getElementById('ubtn').disabled=!sf.length;}

async function uploadAll(){
  var name=document.getElementById('un').value.trim()||'Anonimo';
  myName=name;localStorage.setItem('pUN',name);
  document.getElementById('cmtAvatar').textContent=name[0].toUpperCase();
  if(!sf.length){toast('Elegi al menos una foto');return;}
  var btn=document.getElementById('ubtn');btn.disabled=true;btn.textContent='PUBLICANDO...';
  var pb=document.getElementById('pbar'),pf=document.getElementById('pfill'),ps=document.getElementById('pst');
  pb.style.display='block';ps.style.display='block';
  var done=0;
  for(var i=0;i<sf.length;i++){
    var f=sf[i];ps.textContent='SUBIENDO '+(done+1)+' DE '+sf.length+'...';
    try{var url=await upCloud(f,done,sf.length,function(p,d,t){pf.style.width=((d/t+p/t)*100)+'%';});await saveMeta(url,name,f.type.startsWith('video/')?'video':'image');done++;}
    catch(e){toast('Error: '+f.name);}
  }
  pf.style.width='100%';ps.textContent='LISTO!';
  setTimeout(function(){pb.style.display='none';ps.style.display='none';pf.style.width='0%';ps.textContent='';},2000);
  sf=[];document.getElementById('prevs').innerHTML='';document.getElementById('fi').value='';
  btn.disabled=false;btn.textContent='PUBLICAR';
  closeUpload();toast('Foto publicada!');
}

function upCloud(file,done,total,onP){
  return new Promise(function(res,rej){
    var fd=new FormData();fd.append('file',file);fd.append('upload_preset',UP);fd.append('folder',pid||'party_default');
    var ep=file.type.startsWith('video/')?'https://api.cloudinary.com/v1_1/'+CN+'/video/upload':'https://api.cloudinary.com/v1_1/'+CN+'/image/upload';
    var xhr=new XMLHttpRequest();xhr.open('POST',ep);
    xhr.upload.onprogress=function(e){if(e.lengthComputable)onP(e.loaded/e.total,done,total);};
    xhr.onload=function(){var r=JSON.parse(xhr.responseText);r.secure_url?res(r.secure_url):rej(r.error&&r.error.message);};
    xhr.onerror=function(){rej('net');};xhr.send(fd);
  });
}

async function saveMeta(url,uname,type){
  await db.collection('parties').doc(pid).collection('media').add({url:url,uploaderName:uname,type:type,likes:0,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}

/* FEED */
function loadFeed(){
  if(unsub)unsub();
  unsub=db.collection('parties').doc(pid).collection('media').orderBy('createdAt','desc').onSnapshot(function(snap){
    media=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    renderFeed();
  });
}

function ini(name){return(name||'?')[0].toUpperCase();}

function renderFeed(){
  var feed=document.getElementById('feed');
  if(!media.length){feed.innerHTML='<div class="empty-feed"><div class="ei">📸</div><p>Se el primero en subir una foto!</p></div>';return;}
  feed.innerHTML='';
  media.forEach(function(item,idx){
    var lkKey='l_'+pid+'_'+item.id;
    var isLiked=!!localStorage.getItem(lkKey);
    var comments=item.comments||[];
    var timeStr=item.createdAt&&item.createdAt.toDate?timeAgo(item.createdAt.toDate()):'ahora';
    var likesN=item.likes||0;

    var post=document.createElement('div');post.className='post';

    var mediaHtml=item.type==='video'
      ?'<div class="post-media"><video src="'+item.url+'" controls playsinline preload="metadata"></video></div>'
      :'<div class="post-media" onclick="openLB('+idx+')" style="cursor:pointer"><img src="'+item.url+'" loading="lazy"/></div>';

    // Show last 2 comments preview
    var cmtPreview='';
    if(comments.length>2)cmtPreview+='<div class="cmts-count" onclick="openCmts(\''+item.id+'\')">Ver los '+comments.length+' comentarios</div>';
    comments.slice(-2).forEach(function(c){cmtPreview+='<div class="comment-preview-line"><strong>'+esc(c.name)+'</strong>'+esc(c.text)+'</div>';});

    post.innerHTML=
      '<div class="post-header">'+
        '<div class="post-avatar">'+ini(item.uploaderName)+'</div>'+
        '<div class="post-user"><div class="post-username">'+esc(item.uploaderName||'Anonimo')+'</div><div class="post-time">'+timeStr+'</div></div>'+
        '<button class="post-more">•••</button>'+
      '</div>'+
      mediaHtml+
      '<div class="post-actions">'+
        '<button class="act-btn'+(isLiked?' liked':'')+'\" id="lb_'+item.id+'" onclick="toggleLike(\''+item.id+'\',this)">'+
          '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+
        '</button>'+
        '<button class="act-btn" onclick="openCmts(\''+item.id+'\')" title="Comentarios">'+
          '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+
        '</button>'+
        '<div class="act-spacer"></div>'+
      '</div>'+
      '<div class="post-likes" id="lc_'+item.id+'">'+likesN+' '+(likesN===1?'like':'likes')+'</div>'+
      '<div class="post-caption"><strong>'+esc(item.uploaderName||'Anonimo')+'</strong></div>'+
      '<div class="post-comments-preview" id="cp_'+item.id+'">'+cmtPreview+'</div>'+
      '<div class="post-time-small">'+timeStr+'</div>'+
      '<div class="comment-bar">'+
        '<div class="cbar-avatar">'+ini(myName)+'</div>'+
        '<input class="cbar-input" placeholder="Agrega un comentario..." maxlength="150" oninput="toggleSendInline(\'cs_'+item.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')sendInline(\''+item.id+'\',this)"/>'+
        '<button class="cbar-send" id="cs_'+item.id+'" onclick="sendFromBar(\''+item.id+'\',this)">Publicar</button>'+
      '</div>';
    feed.appendChild(post);
  });
}

/* LIKES */
function toggleLike(id,btn){
  var key='l_'+pid+'_'+id,isLiked=!!localStorage.getItem(key);
  btn.classList.toggle('liked',!isLiked);
  if(isLiked)localStorage.removeItem(key);else localStorage.setItem(key,'1');
  db.collection('parties').doc(pid).collection('media').doc(id).update({likes:firebase.firestore.FieldValue.increment(isLiked?-1:1)});
  var lc=document.getElementById('lc_'+id);
  if(lc){var n=parseInt(lc.textContent)||0;n=isLiked?n-1:n+1;lc.textContent=n+' '+(n===1?'like':'likes');}
}

/* INLINE COMMENT BAR */
function toggleSendInline(btnId,val){var b=document.getElementById(btnId);if(b)b.classList.toggle('on',val.trim().length>0);}
function sendFromBar(id,btn){
  var bar=btn.closest('.comment-bar');
  var inp=bar.querySelector('.cbar-input');
  sendCmt(id,inp.value.trim(),function(){inp.value='';btn.classList.remove('on');});
}
function sendInline(id,inp){sendCmt(id,inp.value.trim(),function(){inp.value='';});}

/* COMMENTS MODAL */
function openCmts(id){
  activeCmtId=id;
  var item=media.find(function(m){return m.id===id;});
  if(!item)return;
  var comments=item.comments||[];
  var list=document.getElementById('cmtList');
  if(!comments.length){list.innerHTML='<div class="cmt-empty">No hay comentarios aun.<br>Se el primero!</div>';}
  else{
    list.innerHTML='';
    comments.forEach(function(c){
      var d=document.createElement('div');d.className='cmt-item';
      d.innerHTML='<div class="cmt-avatar">'+ini(c.name)+'</div><div class="cmt-body"><span class="cmt-name">'+esc(c.name)+'</span><span class="cmt-text">'+esc(c.text)+'</span></div>';
      list.appendChild(d);
    });
  }
  document.getElementById('cmtModal').classList.add('open');
  document.getElementById('cmtInp').focus();
}
function closeCmts(){document.getElementById('cmtModal').classList.remove('open');activeCmtId='';}
function cmtModalBg(e){if(e.target===document.getElementById('cmtModal'))closeCmts();}

function toggleCmtSend(val){var b=document.getElementById('cmtSend');if(b)b.classList.toggle('on',val.trim().length>0);}

function submitCmt(){
  var inp=document.getElementById('cmtInp');
  sendCmt(activeCmtId,inp.value.trim(),function(){
    inp.value='';document.getElementById('cmtSend').classList.remove('on');
    // Refresh comments list
    openCmts(activeCmtId);
  });
}

async function sendCmt(id,txt,cb){
  if(!txt||!id)return;
  var name=myName||document.getElementById('un').value.trim()||'Anonimo';
  await db.collection('parties').doc(pid).collection('media').doc(id).update({comments:firebase.firestore.FieldValue.arrayUnion({name:name,text:txt})});
  if(cb)cb();
}

/* LIGHTBOX */
function openLB(idx){var it=media[idx];var lbi=document.getElementById('lbi'),lbv=document.getElementById('lbv');if(it.type==='video'){lbv.src=it.url;lbv.style.display='block';lbi.style.display='none';lbv.play();}else{lbi.src=it.url;lbi.style.display='block';lbv.style.display='none';}document.getElementById('lb').classList.add('on');}
function closeLB(){document.getElementById('lb').classList.remove('on');document.getElementById('lbv').pause();}

/* SLIDESHOW */
function toggleSS(){var s=document.getElementById('ss');if(s.classList.contains('on')){stopSS();return;}var ph=media.filter(function(m){return m.type==='image';});if(!ph.length){toast('No hay fotos aun');return;}s.classList.add('on');ssIdx=0;showSlide();}
function showSlide(){var ph=media.filter(function(m){return m.type==='image';});if(!ph.length){stopSS();return;}ssIdx=ssIdx%ph.length;var it=ph[ssIdx];document.getElementById('si').src=it.url;document.getElementById('sw').textContent=(it.uploaderName||'Anonimo').toUpperCase();document.getElementById('sc').textContent=(ssIdx+1)+' / '+ph.length;var sp=document.getElementById('sp');sp.style.transition='none';sp.style.width='0%';setTimeout(function(){sp.style.transition='width 5s linear';sp.style.width='100%';},50);if(ssTimer)clearTimeout(ssTimer);ssTimer=setTimeout(function(){ssIdx++;showSlide();},5000);}
function stopSS(){document.getElementById('ss').classList.remove('on');if(ssTimer){clearTimeout(ssTimer);ssTimer=null;}}

/* HELPERS */
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},3000);}
function timeAgo(d){var s=Math.floor((Date.now()-d)/1000);if(s<60)return'hace '+s+'s';if(s<3600)return'hace '+Math.floor(s/60)+'m';if(s<86400)return'hace '+Math.floor(s/3600)+'h';return'hace '+Math.floor(s/86400)+'d';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var uz=document.getElementById('upzone');
if(uz){uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('dov');});uz.addEventListener('dragleave',function(){uz.classList.remove('dov');});uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('dov');hf(e.dataTransfer.files);});}

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
